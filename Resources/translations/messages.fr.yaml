azuracom_spreadsheet_to_object:
    data_transformer_exception:
        boolean: 'Valeur(s) acceptée(s) pour oui: %true_values% - Valeur(s) acceptée(s) pour non: %false_values%'
        datetime: Cette valeur n'est pas une date valide
        decimal: Cette valeur n'est pas un nombre valide
        entity: Valeur "%value%" introuvable
        integer: Cette valeur n'est pas un entier valide
        excel_datetime: Cette valeur n'est pas une date valide
        choice_value_not_found: Valeur "%value%" n'est pas dans la liste prédéfinie%values%
