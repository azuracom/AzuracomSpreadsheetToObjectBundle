azuracom_spreadsheet_to_object:
    data_transformer_exception:
        boolean: 'Accepted value(s) for yes: %true_values% - Accepted value(s) for no: %false_values%'
        datetime: This value is not a valid date
        decimal: This value is not a valid number
        entity: Value %value% not found
        integer: This value is not a valid integer
        excel_datetime: This value is not a valid date
    row_handler:
        error_at_column: 'Row %row% column %column% : %error%'
